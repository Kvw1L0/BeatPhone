<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking BATIPHONE</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">

<style>
  /* ================= CONFIGURACIÓN VISUAL JUNGLE ================= */
  :root {
    --brand-color:  #C8743B; ; 
    --dark-bg: #000000;
    --text-glow: 0 0 15px rgba(252, 238, 9, 0.6);
    --organic-border: 255px 15px 225px 15px/15px 225px 15px 255px; 
  }

  body {
    background-color: var(--dark-bg);
    background-image: url("fondo.png");
    background-size: cover;
    background-position: center;
    color: white;
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 10, 0.85); 
    z-index: -1;
  }

  /* ================= ESTILOS MOBILE FIRST (Por defecto) ================= */
  
  h1 {
    font-size: 2.2rem; /* Tamaño más pequeño para celular */
    margin: 20px 0 15px 0;
    text-transform: uppercase;
    color: var(--brand-color);
    text-shadow: 2px 2px 0px #000;
    font-weight: 900;
    letter-spacing: 1px;
    text-align: center;
  }

  .container {
    width: 95%; /* Casi el ancho total del celular */
    max-width: 1000px;
    background: rgba(10, 10, 10, 0.8);
    border: 3px solid var(--brand-color); /* Borde un poco más fino */
    border-radius: var(--organic-border);
    padding: 15px 10px; /* Menos relleno interno */
    box-shadow: 0 0 15px rgba(252, 238, 9, 0.3), inset 0 0 10px rgba(252, 238, 9, 0.1);
    backdrop-filter: blur(5px);
    overflow-y: auto; /* Por si el ranking crece, permite hacer scroll en el celular */
    max-height: 80vh; 
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 15px;
    font-size: 1rem; /* Letra de cabecera adaptada */
    font-weight: 900;
    border-bottom: 2px solid var(--brand-color);
    color: var(--brand-color);
    text-transform: uppercase;
  }

  #ranking-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .rank-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 15px;
    font-size: 1.1rem; /* Texto base para los de abajo */
    font-weight: 700;
    border-bottom: 1px solid rgba(252, 238, 9, 0.2);
    animation: fadeIn 0.5s ease-out;
  }

  /* Tamaños ajustados para el Top 3 en celular */
  .rank-item:nth-child(1) { color: var(--brand-color); font-weight: 900; font-size: 1.5rem; text-shadow: var(--text-glow); }
  .rank-item:nth-child(2) { color: #E0E0E0; font-size: 1.3rem; text-shadow: 0 0 10px rgba(255,255,255,0.4); } 
  .rank-item:nth-child(3) { color: #CD7F32; font-size: 1.2rem; } 

  .rank-pos { width: 30px; text-align: center; }
  .rank-name { 
    flex-grow: 1; 
    text-align: left; 
    padding-left: 10px; 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis; /* Pone "..." si el nombre es muy largo */
  }
  .rank-time { font-family: monospace; font-weight: 900; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .loading {
    text-align: center; font-size: 1.2rem; padding: 30px;
    color: var(--brand-color); opacity: 0.7; text-transform: uppercase; font-weight: bold;
    animation: pulse 1.5s infinite alternate;
  }

  @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

  /* ================= ADAPTACIÓN PARA ESCRITORIO / TV (Tablets en adelante) ================= */
  @media (min-width: 768px) {
    h1 {
      font-size: 4em;
      margin: 30px 0 20px 0;
      letter-spacing: 2px;
    }
    .container {
      width: 80%;
      padding: 20px;
      border: 4px solid var(--brand-color);
    }
    .header-row {
      font-size: 1.5em;
      padding: 15px 30px;
      border-bottom: 3px solid var(--brand-color);
    }
    .rank-item {
      font-size: 2em;
      padding: 15px 30px;
    }
    .rank-pos { width: 50px; }
    .rank-name { padding-left: 20px; }
    
    .rank-item:nth-child(1) { font-size: 2.5em; }
    .rank-item:nth-child(2) { font-size: 2.2em; }
    .rank-item:nth-child(3) { font-size: 2.1em; }
    
    .loading { font-size: 1.5em; padding: 40px; }
  }

</style>
</head>
<body>

<div class="overlay"></div>

<h1>🏆 RANKING BATIPHONE 🏆 </h1>

<div class="container">
  <div class="header-row">
    <span class="rank-pos">#</span>
    <span class="rank-name">Jugador</span>
    <span class="rank-time">Tiempo</span>
  </div>
  
  <ul id="ranking-list">
    <div class="loading">Cargando puntajes...</div>
  </ul>
</div>

<script>
  // La URL de tu Google Script
  const API_URL = "https://script.google.com/macros/s/AKfycbyViG0_MaktcyCywQJ1BMhx6arnVndR3qYK4gPiYU7X8lAwEs0ZfDnq5yvV7oEAI7qktg/exec";
  
  async function updateRanking() {
    try {
      const response = await fetch(API_URL);
      const data = await response.json();

      const list = document.getElementById("ranking-list");
      list.innerHTML = ""; 

      data.forEach((player, index) => {
        const li = document.createElement("li");
        li.className = "rank-item";
        
        let icon = "";
        if (index === 0) icon = "👑 ";
        else if (index === 1) icon = "🥈 ";
        else if (index === 2) icon = "🥉 ";

        li.innerHTML = `
          <span class="rank-pos">${index + 1}</span>
          <span class="rank-name">${icon}${player.name}</span>
          <span class="rank-time">${player.time.toFixed(2)}s</span>
        `;
        list.appendChild(li);
      });

    } catch (error) {
      console.error("Error cargando ranking:", error);
    }
  }

  updateRanking();
  setInterval(updateRanking, 2000);

</script>

</body>
</html>
