<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desafío Jungle</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
    
    <style>
        /* ================= CONFIGURACIÓN ================= */
        :root {
            --brand-color: #FCEE09; 
            --dark-bg: rgba(10, 10, 10, 0.95);
            --logo-size: 350px; 
            --bg-image: url('fondo.png'); 
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #000;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* Eliminado el user-select global que causaba el bug */
        }

        /* --- CLASE MAESTRA PARA OCULTAR (A PRUEBA DE FALLOS) --- */
        .hidden { 
            display: none !important; 
        }

        .overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
        }

        .panel {
            background: var(--dark-bg);
            border: 4px solid var(--brand-color);
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            box-shadow: 0 0 20px rgba(252, 238, 9, 0.6), inset 0 0 15px rgba(252, 238, 9, 0.2);
            padding: 35px 25px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 { 
            color: var(--brand-color); font-size: 1.8rem; 
            margin-top: 0; margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #000, 0 0 10px rgba(252, 238, 9, 0.5);
        }

        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { color: #fff; font-size: 0.9rem; margin-bottom: 5px; display: block; text-transform: uppercase;}
        
        input {
            width: 100%; padding: 15px; font-size: 1.1rem;
            background: #111; color: var(--brand-color);
            border: 2px solid #444; 
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            font-family: 'Montserrat', sans-serif; font-weight: bold;
            outline: none;
            /* REGLA CRÍTICA PARA QUE SE PUEDA ESCRIBIR EN CELULARES */
            user-select: text; -webkit-user-select: text;
        }
        input:focus { border-color: var(--brand-color); box-shadow: 0 0 10px rgba(252, 238, 9, 0.3);}
        input::placeholder { color: #555; font-weight: normal; }

        button {
            width: 100%; padding: 18px; font-size: 1.4rem; font-weight: 900;
            background: var(--brand-color); color: #000;
            border: none; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            cursor: pointer; text-transform: uppercase; margin-top: 15px;
            box-shadow: 0 5px 0px #b5aa05, 0 0 20px rgba(252, 238, 9, 0.4);
        }
        button:active { transform: translateY(5px); box-shadow: 0 0px 0px #b5aa05; }

        .instruction-item {
            display: flex; align-items: center; text-align: left;
            margin-bottom: 20px; color: #fff; font-size: 1rem;
        }
        .instruction-icon {
            font-size: 2rem; margin-right: 15px;
            background: #222; border-radius: 50%; padding: 10px;
            border: 2px solid var(--brand-color);
            box-shadow: 0 0 15px rgba(252, 238, 9, 0.5);
        }

        #screen-countdown { background: rgba(0,0,0,0.85); }
        .countdown-text {
            font-size: 10rem; font-weight: 900; color: var(--brand-color);
            text-shadow: 0 0 30px var(--brand-color), 4px 4px 0 #000;
            animation: pulseIn 1s infinite;
        }

        .logo-wrapper {
            position: relative; width: var(--logo-size); height: var(--logo-size);
            display: none; z-index: 10;
            /* Aquí sí evitamos que el usuario seleccione la imagen por error */
            user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .logo-img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: contain; pointer-events: none;
        }
        .ghost { opacity: 0.15; filter: grayscale(1); z-index: 1; }
        .full-color {
            z-index: 2; opacity: 1;
            filter: drop-shadow(0 0 25px rgba(252, 238, 9, 0.9));
            clip-path: inset(100% 0 0 0); -webkit-clip-path: inset(100% 0 0 0);
            transform: translateZ(0); will-change: clip-path;
        }

        .big-text { 
            font-size: 5rem; margin: 10px 0; font-weight: 900; 
            color: var(--brand-color); text-shadow: 0 0 20px var(--brand-color), 3px 3px 0 #000;
        }
        
        #confetti-canvas { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            pointer-events: none; z-index: 200; 
        }

        @keyframes pulseIn {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="screen-form" class="overlay">
        <div class="panel">
            <h2>Ingresa para jugar</h2>
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="player-name" placeholder="Ej: Juan Pérez" autocomplete="off">
            </div>
            <button id="btn-next">Siguiente</button>
        </div>
    </div>

    <div id="screen-instructions" class="overlay hidden">
        <div class="panel">
            <h2>Cómo Jugar</h2>
            <div class="instruction-item">
                <div class="instruction-icon">📱</div>
                <div>Agita tu celular rápidamente para cargar la energía neón.</div>
            </div>
            <div class="instruction-item">
                <div class="instruction-icon">⏱️</div>
                <div>El tiempo más rápido gana. ¡Dale con todo!</div>
            </div>
            <div class="instruction-item">
                <div class="instruction-icon">👆</div>
                <div>Si no puedes agitar, tapea rápido la lata.</div>
            </div>
            <button id="btn-start">¡LISTO, VAMOS!</button>
        </div>
    </div>

    <div id="screen-countdown" class="overlay hidden">
        <div class="countdown-text" id="countdown-number">3</div>
    </div>

    <div id="screen-result" class="overlay hidden">
        <div class="panel">
            <h2>¡Carga Completa!</h2>
            <p style="color: white; font-size:1.2rem; margin:0; text-transform:uppercase; font-weight:700;">Tu tiempo fue:</p>
            <p class="big-text" id="final-time">0.00s</p>
            <button id="btn-reload">Jugar de nuevo</button>
        </div>
    </div>

    <div id="game-container" class="logo-wrapper">
        <img src="logo.png" class="logo-img ghost" alt="Lata Fondo">
        <img src="logo.png" id="full-image" class="logo-img full-color" alt="Lata Neón">
    </div>

    <canvas id="confetti-canvas"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        (function() {
            const CONFIG = Object.freeze({
                webhookUrl: "https://script.google.com/macros/s/AKfycbyViG0_MaktcyCywQJ1BMhx6arnVndR3qYK4gPiYU7X8lAwEs0ZfDnq5yvV7oEAI7qktg/exec", 
                targetBeats: 500, 
                threshold: 15, 
                minTimePossible: 2.0 
            });

            let state = { active: false, countdownActive: false, beats: 0, start: 0, name: "", lastBeatTime: 0 };
            let animationPending = false;

            const ui = {
                screenForm: document.getElementById("screen-form"),
                screenInstructions: document.getElementById("screen-instructions"),
                screenCountdown: document.getElementById("screen-countdown"),
                screenResult: document.getElementById("screen-result"),
                countdownNumber: document.getElementById("countdown-number"),
                gameContainer: document.getElementById("game-container"),
                fullImage: document.getElementById("full-image"),
                finalTimeText: document.getElementById("final-time"),
                nameInput: document.getElementById("player-name"),
                btnNext: document.getElementById("btn-next"),
                btnStart: document.getElementById("btn-start"),
                btnReload: document.getElementById("btn-reload")
            };

            // Flujo 1: Botón Siguiente
            ui.btnNext.addEventListener('click', () => {
                const name = ui.nameInput.value.trim();
                
                // Validación visual sin alertas que bloqueen
                if(!name) { 
                    ui.nameInput.style.borderColor = "#ff3333";
                    ui.nameInput.placeholder = "¡FALTA TU NOMBRE!";
                    ui.nameInput.focus();
                    return; 
                }
                
                ui.nameInput.style.borderColor = "var(--brand-color)";
                state.name = name;
                
                // Transición segura
                ui.screenForm.classList.add("hidden");
                ui.screenInstructions.classList.remove("hidden");
            });

            // Flujo 2: Botón Iniciar
            ui.btnStart.addEventListener('click', async () => {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    try {
                        const resp = await DeviceMotionEvent.requestPermission();
                        if (resp !== 'granted') console.log("Sensores no autorizados.");
                    } catch (e) { console.error(e); }
                }

                ui.screenInstructions.classList.add("hidden");
                ui.gameContainer.style.display = "block";
                
                startCountdown();
            });

            // Botón Recargar
            ui.btnReload.addEventListener('click', () => {
                location.reload();
            });

            // Lógica Cuenta Regresiva
            const startCountdown = () => {
                state.countdownActive = true;
                ui.screenCountdown.classList.remove("hidden");
                
                let count = 3;
                ui.countdownNumber.innerText = count;
                if(navigator.vibrate) navigator.vibrate(100);

                const interval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        ui.countdownNumber.innerText = count;
                        if(navigator.vibrate) navigator.vibrate(100);
                    } else if (count === 0) {
                        ui.countdownNumber.innerText = "¡GO!";
                        if(navigator.vibrate) navigator.vibrate(300);
                    } else {
                        clearInterval(interval);
                        ui.screenCountdown.classList.add("hidden");
                        state.countdownActive = false;
                        startGame();
                    }
                }, 1000); 
            };

            const startGame = () => {
                state.active = true;
                state.start = Date.now(); 
                state.beats = 0;

                ui.fullImage.style.clipPath = `inset(100% 0 0 0)`;
                ui.fullImage.style.webkitClipPath = `inset(100% 0 0 0)`;

                window.addEventListener("devicemotion", handleMotion);
                ui.gameContainer.addEventListener("click", handleTap);
            };

            const handleMotion = (e) => {
                if (!state.active) return;
                const acc = e.acceleration;
                const force = Math.abs(acc.x || 0) + Math.abs(acc.y || 0) + Math.abs(acc.z || 0);
                if (force > CONFIG.threshold) addBeat(1);
            };

            const handleTap = () => {
                if (!state.active) return;
                const now = Date.now();
                if(now - state.lastBeatTime < 50) return; 
                state.lastBeatTime = now;
                addBeat(5); 
            };

            const addBeat = (amount) => {
                state.beats += amount;
                const progress = Math.min((state.beats / CONFIG.targetBeats) * 100, 100);
                const clip = 100 - progress;

                if(navigator.vibrate) navigator.vibrate(20);

                if (!animationPending) {
                    animationPending = true;
                    requestAnimationFrame(() => {
                        ui.fullImage.style.clipPath = `inset(${clip}% 0 0 0)`;
                        ui.fullImage.style.webkitClipPath = `inset(${clip}% 0 0 0)`;
                        animationPending = false;
                    });
                }

                if (state.beats >= CONFIG.targetBeats) finish();
            };

            const finish = () => {
                if (!state.active) return;
                state.active = false;
                
                const endTime = Date.now();
                const totalTime = ((endTime - state.start) / 1000).toFixed(2);

                if (totalTime < CONFIG.minTimePossible) {
                    alert("¡Demasiado rápido! Intenta de nuevo.");
                    location.reload();
                    return;
                }

                if(navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);

                ui.finalTimeText.innerText = `${totalTime}s`;
                ui.screenResult.classList.remove("hidden");
                ui.gameContainer.style.display = "none"; // Oculta la lata al ganar para ver el panel
                
                launchConfetti();
                sendData(totalTime);
            };

            const sendData = (time) => {
                const payload = { name: state.name, time: time, v: btoa(state.name + time) };
                fetch(CONFIG.webhookUrl, {
                    method: "POST", mode: "no-cors", body: JSON.stringify(payload)
                }).catch((error) => console.error("Error:", error));
            };

            const launchConfetti = () => {
                const myConfetti = confetti.create(document.getElementById('confetti-canvas'), { resize: true });
                myConfetti({ particleCount: 150, spread: 90, origin: { y: 0.5 }, colors: ['#FCEE09', '#000000', '#ffffff'] });
            };
        })();
    </script>
</body>
</html>
