<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Desafío Jungle</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
    
    <style>
        /* ================= CONFIGURACIÓN VISUAL JUNGLE ================= */
        :root {
            --brand-color: #FCEE09; /* Amarillo Jungle Neón */
            --dark-bg: rgba(10, 10, 10, 0.95);
            --logo-size: 350px; 
            --bg-image: url('fondo.png'); /* Asegúrate que se llama fondo.png en Vercel */
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            background-color: #000;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- PANELES ESTILO DIBUJADO A MANO ALZADA CON NEÓN --- */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .panel {
            background: var(--dark-bg);
            /* Bordes asimétricos para efecto "mano alzada" */
            border: 4px solid var(--brand-color);
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            /* Resplandor neón neón en el marco */
            box-shadow: 
                0 0 20px rgba(252, 238, 9, 0.6), 
                inset 0 0 15px rgba(252, 238, 9, 0.2);
            padding: 35px 25px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        .hidden { 
            opacity: 0 !important; 
            pointer-events: none !important; 
            transform: scale(0.9) !important;
            position: absolute;
        }

        h2 { 
            color: var(--brand-color); 
            font-size: 1.8rem; 
            margin-top: 0; 
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #000, 0 0 10px rgba(252, 238, 9, 0.5);
        }

        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { color: #fff; font-size: 0.9rem; margin-bottom: 5px; display: block; text-transform: uppercase;}
        
        input {
            width: 100%; padding: 15px; font-size: 1.1rem;
            background: #111; color: var(--brand-color);
            border: 2px solid #444; 
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            font-family: 'Montserrat', sans-serif; font-weight: bold;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: var(--brand-color); box-shadow: 0 0 10px rgba(252, 238, 9, 0.3);}
        input::placeholder { color: #555; font-weight: normal; }

        button {
            width: 100%; padding: 18px; font-size: 1.4rem; font-weight: 900;
            background: var(--brand-color); color: #000;
            border: none; 
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            cursor: pointer;
            text-transform: uppercase; margin-top: 15px;
            box-shadow: 0 5px 0px #b5aa05, 0 0 20px rgba(252, 238, 9, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active { transform: translateY(5px); box-shadow: 0 0px 0px #b5aa05, 0 0 10px rgba(252, 238, 9, 0.2); }

        /* --- INSTRUCCIONES --- */
        .instruction-item {
            display: flex; align-items: center; text-align: left;
            margin-bottom: 20px; color: #fff; font-size: 1rem;
        }
        .instruction-icon {
            font-size: 2rem; margin-right: 15px;
            background: #222; border-radius: 50%; padding: 10px;
            border: 2px solid var(--brand-color);
            box-shadow: 0 0 15px rgba(252, 238, 9, 0.5);
        }

        /* --- CUENTA REGRESIVA --- */
        #screen-countdown {
            z-index: 150;
            background: rgba(0,0,0,0.85);
        }
        .countdown-text {
            font-size: 10rem;
            font-weight: 900;
            color: var(--brand-color);
            text-shadow: 0 0 30px var(--brand-color), 4px 4px 0 #000;
            animation: pulseIn 1s infinite;
        }

        /* --- JUEGO (LOGO/LATA) --- */
        .logo-wrapper {
            position: relative; width: var(--logo-size); height: var(--logo-size);
            display: none; z-index: 10;
        }
        .logo-img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: contain; pointer-events: none;
        }
        /* Lata fantasma de fondo (translucida) */
        .ghost { opacity: 0.15; filter: grayscale(1); z-index: 1; }
        
        /* Lata neón que se llena (Sin transition para evitar lag) */
        .full-color {
            z-index: 2; opacity: 1;
            /* Recuperamos el Drop Shadow Neón pero optimizado */
            filter: drop-shadow(0 0 25px rgba(252, 238, 9, 0.9));
            clip-path: inset(100% 0 0 0);
            -webkit-clip-path: inset(100% 0 0 0);
            /* Forzar aceleración GPU para reducir lag */
            transform: translateZ(0); 
            will-change: clip-path;
        }

        /* --- RESULTADOS --- */
        .big-text { 
            font-size: 5rem; margin: 10px 0; font-weight: 900; 
            color: var(--brand-color); 
            text-shadow: 0 0 20px var(--brand-color), 3px 3px 0 #000;
        }
        
        #confetti-canvas { 
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            pointer-events: none; z-index: 200; 
        }

        /* Animaciones */
        @keyframes pulseIn {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="screen-form" class="overlay">
        <div class="panel">
            <h2>Ingresa para jugar</h2>
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="player-name" placeholder="Ej: Juan Pérez">
            </div>
            <button id="btn-next">Siguiente</button>
        </div>
    </div>

    <div id="screen-instructions" class="overlay hidden">
        <div class="panel">
            <h2>Cómo Jugar</h2>
            <div class="instruction-item">
                <div class="instruction-icon">📱</div>
                <div>Agita tu celular rápidamente para cargar la energía neón.</div>
            </div>
            <div class="instruction-item">
                <div class="instruction-icon">⏱️</div>
                <div>El tiempo más rápido gana. ¡Dale con todo!</div>
            </div>
            <div class="instruction-item">
                <div class="instruction-icon">👆</div>
                <div>Si no puedes agitar, tapea rápido la lata.</div>
            </div>
            <button id="btn-start">¡LISTO, VAMOS!</button>
        </div>
    </div>

    <div id="screen-countdown" class="overlay hidden">
        <div class="countdown-text" id="countdown-number">3</div>
    </div>

    <div id="screen-result" class="overlay hidden">
        <div class="panel">
            <h2>¡Carga Completa!</h2>
            <p style="color: white; font-size:1.2rem; margin:0; text-transform:uppercase; font-weight:700;">Tu tiempo fue:</p>
            <p class="big-text" id="final-time">0.00s</p>
            <button onclick="location.reload()">Jugar de nuevo</button>
        </div>
    </div>

    <div id="game-container" class="logo-wrapper
