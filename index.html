<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Desafío Jungle</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-color: #FCEE09; 
            --dark-bg: rgba(10, 10, 10, 0.95);
            --logo-size: 350px; 
            --bg-image: url('fondo.png'); 
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
            background-color: #000; background-image: var(--bg-image);
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .panel {
            background: var(--dark-bg);
            border: 4px solid var(--brand-color);
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            box-shadow: 0 0 15px rgba(252, 238, 9, 0.4), inset 0 0 10px rgba(252, 238, 9, 0.1);
            padding: 35px 25px; width: 90%; max-width: 400px;
            text-align: center; position: relative;
        }

        .hidden { opacity: 0; pointer-events: none; transform: scale(0.9); position: absolute; }

        h2 { color: var(--brand-color); font-size: 1.8rem; margin-top: 0; margin-bottom: 20px; text-transform: uppercase; text-shadow: 2px 2px 0px #000; }

        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { color: #fff; font-size: 0.9rem; margin-bottom: 5px; display: block; }
        
        input {
            width: 100%; padding: 15px; font-size: 1.1rem;
            background: #111; color: var(--brand-color);
            border: 2px solid #444; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            font-family: 'Montserrat', sans-serif; font-weight: bold; transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: var(--brand-color); }

        button {
            width: 100%; padding: 18px; font-size: 1.4rem; font-weight: 900;
            background: var(--brand-color); color: #000;
            border: none; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            cursor: pointer; text-transform: uppercase; margin-top: 15px;
            box-shadow: 0 5px 0px #b5aa05; transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active { transform: translateY(5px); box-shadow: 0 0px 0px #b5aa05; }

        /* Estilo para el botón de ir al ranking */
        .btn-secondary {
            background: #111; color: var(--brand-color);
            border: 2px solid var(--brand-color);
            box-shadow: 0 5px 0px rgba(252, 238, 9, 0.3);
            margin-top: 25px;
        }
        .btn-secondary:active { box-shadow: 0 0px 0px rgba(252, 238, 9, 0.3); }

        .instruction-item { display: flex; align-items: center; text-align: left; margin-bottom: 20px; color: #fff; font-size: 1rem; }
        .instruction-icon { font-size: 2rem; margin-right: 15px; background: #222; border-radius: 50%; padding: 10px; border: 1px solid var(--brand-color); box-shadow: 0 0 10px rgba(252, 238, 9, 0.3); }

        .logo-wrapper { position: relative; width: var(--logo-size); height: var(--logo-size); display: none; z-index: 10; }
        .logo-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .ghost { opacity: 0.2; filter: grayscale(1); z-index: 1; }
        
        .full-color {
            z-index: 2; opacity: 1; clip-path: inset(100% 0 0 0); -webkit-clip-path: inset(100% 0 0 0);
            transform: translateZ(0); will-change: clip-path;
        }

        .big-text { font-size: 3.5rem; margin: 10px 0; font-weight: 900; color: var(--brand-color); }
        
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 200; }
        
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="screen-form" class="overlay">
        <div class="panel">
            <h2>Ingresa para jugar</h2>
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="player-name" placeholder="Ej: Juan Pérez">
            </div>
            <div class="form-group">
                <label>Número de Celular:</label>
                <input type="tel" id="player-phone" placeholder="(+56) 9...">
            </div>
            <button id="btn-next">Siguiente</button>
        </div>
    </div>

    <div id="screen-instructions" class="overlay hidden">
        <div class="panel">
            <h2>Cómo Jugar</h2>
            <div class="instruction-item">
                <div class="instruction-icon">📱</div>
                <div>Agita tu celular rápidamente para cargar la energía.</div>
            </div>
            <div class="instruction-item">
                <div class="instruction-icon">⏱️</div>
                <div>El tiempo más rápido se lleva el premio.</div>
            </div>
            <div class="instruction-item">
                <div class="instruction-icon">👆</div>
                <div>Si no puedes agitar, tapea rápido la pantalla.</div>
            </div>
            <button id="btn-start">¡LISTO, VAMOS!</button>
        </div>
    </div>

    <div id="screen-result" class="overlay hidden">
        <div class="panel">
            <h2>¡Carga Completa!</h2>
            <p style="color: white; font-size:1.2rem; margin:0;">Tu tiempo fue:</p>
            <p class="big-text" id="final-time">0.00s</p>
            
            <div style="background: rgba(252, 238, 9, 0.1); border: 1px solid var(--brand-color); border-radius: 10px; padding: 15px; margin: 15px 0;">
                <p id="rank-text" style="color: var(--brand-color); font-size: 1.1rem; font-weight: bold; margin: 0; animation: pulse 0.8s infinite alternate;">Calculando tu posición...</p>
            </div>

            <button onclick="window.location.href='ranking.html'" class="btn-secondary">🏆 VER RANKING</button>
            <button onclick="location.reload()">JUGAR DE NUEVO</button>
        </div>
    </div>

    <div id="game-container" class="logo-wrapper">
        <img src="logo.png" class="logo-img ghost" alt="Logo Fondo">
        <img src="logo.png" id="full-image" class="logo-img full-color" alt="Logo Color">
    </div>

    <canvas id="confetti-canvas"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        (function() {
            const CONFIG = Object.freeze({
                webhookUrl: "https://script.google.com/macros/s/AKfycbyViG0_MaktcyCywQJ1BMhx6arnVndR3qYK4gPiYU7X8lAwEs0ZfDnq5yvV7oEAI7qktg/exec", 
                targetBeats: 500, 
                threshold: 15,
                minTimePossible: 2.0 
            });

            let state = { active: false, beats: 0, start: 0, name: "", phone: "", lastBeatTime: 0 };
            let animationPending = false;

            const ui = {
                screenForm: document.getElementById("screen-form"),
                screenInstructions: document.getElementById("screen-instructions"),
                screenResult: document.getElementById("screen-result"),
                gameContainer: document.getElementById("game-container"),
                fullImage: document.getElementById("full-image"),
                finalTimeText: document.getElementById("final-time"),
                rankText: document.getElementById("rank-text"),
                nameInput: document.getElementById("player-name"),
                phoneInput: document.getElementById("player-phone"),
                btnNext: document.getElementById("btn-next"),
                btnStart: document.getElementById("btn-start")
            };

            ui.btnNext.onclick = () => {
                const name = ui.nameInput.value.trim();
                const phone = ui.phoneInput.value.trim();
                if(!name || !phone) return alert("Por favor, completa todos los datos para continuar.");
                state.name = name; state.phone = phone;
                ui.screenForm.classList.add("hidden");
                setTimeout(() => ui.screenInstructions.classList.remove("hidden"), 300);
            };

            ui.btnStart.onclick = async () => {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    try {
                        const resp = await DeviceMotionEvent.requestPermission();
                        if (resp !== 'granted') console.log("Sensor denegado. Usará clics.");
                    } catch (e) { console.error(e); }
                }
                ui.screenInstructions.classList.add("hidden");
                ui.gameContainer.style.display = "block";
                state.active = true; state.start = Date.now(); state.beats = 0;
                window.addEventListener("devicemotion", handleMotion);
                ui.gameContainer.addEventListener("click", handleTap);
            };

            const handleMotion = (e) => {
                if (!state.active) return;
                const acc = e.acceleration;
                const force = Math.abs(acc.x || 0) + Math.abs(acc.y || 0) + Math.abs(acc.z || 0);
                if (force > CONFIG.threshold) addBeat(1);
            };

            const handleTap = () => {
                if (!state.active) return;
                const now = Date.now();
                if(now - state.lastBeatTime < 50) return; 
                state.lastBeatTime = now; addBeat(5); 
            };

            const addBeat = (amount) => {
                state.beats += amount;
                const progress = Math.min((state.beats / CONFIG.targetBeats) * 100, 100);
                const clip = 100 - progress;

                if (!animationPending) {
                    animationPending = true;
                    requestAnimationFrame(() => {
                        ui.fullImage.style.clipPath = `inset(${clip}% 0 0 0)`;
                        ui.fullImage.style.webkitClipPath = `inset(${clip}% 0 0 0)`;
                        animationPending = false;
                    });
                }
                if (state.beats >= CONFIG.targetBeats) finish();
            };

            const finish = () => {
                if (!state.active) return;
                state.active = false;
                const endTime = Date.now();
                const totalTime = ((endTime - state.start) / 1000).toFixed(2);

                if (totalTime < CONFIG.minTimePossible) {
                    alert("¡Demasiado rápido! Parece un error o trampa.");
                    location.reload(); return;
                }

                ui.finalTimeText.innerText = `${totalTime}s`;
                ui.screenResult.classList.remove("hidden");
                launchConfetti(); sendData(totalTime);
            };

            const sendData = (time) => {
                const payload = {
                    name: state.name, phone: state.phone,
                    time: parseFloat(time), v: btoa(state.name + time) 
                };

                // Truco de magia: Usamos text/plain para saltarnos el bloqueo CORS de Google 
                // y poder leer la respuesta JSON que nos mandará tu Excel.
                fetch(CONFIG.webhookUrl, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                    if(data.posicion) {
                        ui.rankText.style.animation = "none";
                        ui.rankText.innerHTML = `¡Quedaste en la posición<br><span style="font-size: 2.2rem; color: #fff;">#${data.posicion}</span><br>de ${data.total} jugadores!`;
                    }
                })
                .catch(() => {
                    ui.rankText.style.animation = "none";
                    ui.rankText.innerText = "¡Tiempo guardado!";
                });
            };

            const launchConfetti = () => {
                const myConfetti = confetti.create(document.getElementById('confetti-canvas'), { resize: true });
                myConfetti({ particleCount: 150, spread: 90, origin: { y: 0.5 }, colors: ['#FCEE09', '#000000', '#ffffff'] });
            };
        })();
    </script>
</body>
</html>
